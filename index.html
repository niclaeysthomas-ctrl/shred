<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0b09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shred">
<link rel="manifest" href="manifest.webmanifest">
<title>SHRED — d'intermédiaire à expert</title>
<style>
  :root{
    --bg:#0d0b09; --bg2:#161210; --bg3:#211a14; --line:#332921;
    --txt:#f2ede6; --dim:#a2938a;
    --acc:#f59b2d; --accd:#c67a1c; --red:#e0563f;
    --ok:#35c77f; --bad:#ff5c6c; --blue:#5b9cff;
    --r:13px;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overscroll-behavior:none}
  #app{max-width:520px;margin:0 auto;min-height:100%;display:flex;flex-direction:column}
  main{flex:1;padding:16px 16px 92px}
  header{padding:14px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line)}
  .logo{font-weight:900;font-size:20px;letter-spacing:1px;font-style:italic}
  .logo span{color:var(--acc)}
  .hbadges{display:flex;gap:7px}
  .badge{font-family:var(--mono);font-weight:700;font-size:11.5px;background:var(--bg2);border:1px solid var(--line);padding:6px 10px;border-radius:9px}
  .badge.gold{color:var(--acc);border-color:#4a3823}

  h1.page{font-size:23px;font-weight:900;font-style:italic;margin-bottom:4px}
  h2.sec{font-size:12px;text-transform:uppercase;letter-spacing:1.6px;color:var(--dim);margin:18px 0 8px;display:flex;align-items:center;gap:10px}
  h2.sec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
  .sub{color:var(--dim);font-size:13px;margin-bottom:14px;line-height:1.5}
  .card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-bottom:12px}

  .hero{background:linear-gradient(135deg,#1d130c,#241a0e);border:1px solid #4a3823;border-top:3px solid var(--acc);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .hero .lab{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--acc);font-weight:800}
  .hero .big{font-family:var(--mono);font-size:23px;font-weight:800;margin:4px 0 8px}
  .xpbar{height:9px;border-radius:3px;background:#0009;overflow:hidden;margin:2px 0 4px}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accd),var(--acc));transition:width .4s}
  .xptxt{font-family:var(--mono);font-size:11px;color:var(--dim)}

  .coach{background:var(--bg2);border-left:3px solid var(--acc);border-radius:0 var(--r) var(--r) 0;padding:13px 14px;margin-bottom:12px;font-size:14px;line-height:1.55}
  .coach b{color:var(--acc)}

  .act{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:8px;cursor:pointer}
  .act:active{background:var(--bg3)}
  .act .ico{width:38px;height:38px;border-radius:11px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .act .t{flex:1;min-width:0}
  .act .t b{display:block;font-size:14px}
  .act .t small{color:var(--dim);font-size:12px;line-height:1.35;display:block;margin-top:1px}
  .act .st{font-size:13px;flex-shrink:0;color:var(--dim);font-family:var(--mono);font-weight:700}
  .act.done{opacity:.55}
  .act.done .st{color:var(--ok)}
  .act.hot{border-color:#4a3823;background:linear-gradient(135deg,#191008,#1d150b)}

  .tag{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;background:var(--bg3);color:var(--acc);border:1px solid #4a3823;padding:3px 8px;border-radius:6px;margin-right:6px;margin-bottom:4px}
  .tag.b{color:var(--blue);border-color:#27406e}
  .tag.g{color:var(--ok);border-color:#1e4a36}

  pre.tab{font-family:var(--mono);font-size:11.5px;line-height:1.55;background:#080604;border:1px solid var(--line);border-radius:10px;padding:12px 10px;overflow-x:auto;color:#e8dfd2;margin:10px 0}

  .btn{display:block;border:none;border-radius:12px;padding:13px 20px;font-size:15px;font-weight:800;cursor:pointer;background:var(--acc);color:#221200;width:100%;text-align:center;margin-top:12px}
  .btn:active{transform:scale(.97)}
  .btn.ghost{background:var(--bg3);color:var(--txt);border:1px solid var(--line)}
  .btn[disabled]{opacity:.4;pointer-events:none}
  .danger{color:var(--bad);background:none;border:1px solid #55232c;border-radius:12px;width:100%;padding:12px;font-size:13px;font-weight:700;cursor:pointer;margin-top:10px}

  #ov{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;overflow-y:auto}
  #ov.on{display:block}
  #ov .inner{max-width:520px;margin:0 auto;padding:14px 16px 60px}
  #ov .top{display:flex;align-items:center;gap:10px;margin-bottom:12px;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
  #ov .top .x{width:36px;height:36px;border-radius:11px;background:var(--bg2);border:1px solid var(--line);color:var(--txt);font-size:16px;cursor:pointer;flex-shrink:0}
  #ov .top b{font-size:16.5px;flex:1;font-weight:800}
  .story p{font-size:14.5px;line-height:1.65;color:#e6ddd2;margin-bottom:12px}
  .meta{color:var(--dim);font-size:12.5px;margin-bottom:10px}
  .pt{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;font-size:13.5px;line-height:1.55;color:#e0d8cc;margin-bottom:8px}
  .pt b{color:var(--acc)}
  .crit{background:#12201a;border:1px solid #1e4a36;border-radius:12px;padding:12px 13px;font-size:13.5px;line-height:1.5;margin-top:4px}
  .crit b{color:var(--ok)}

  /* paliers BPM */
  .prow{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0 4px}
  .prow .p{background:var(--bg3);border:1px solid var(--line);border-radius:10px;padding:9px 4px;text-align:center}
  .prow .p small{display:block;font-size:9.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--dim);font-weight:800}
  .prow .p b{font-family:var(--mono);font-size:15px}
  .prow .p.hit{background:#12201a;border-color:#1e4a36}
  .prow .p.hit b{color:var(--ok)}
  .prow .p.next{border-color:#4a3823}
  .prow .p.next b{color:var(--acc)}
  .bpmlog{display:flex;gap:8px;margin-top:10px}
  .bpmlog input{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px;font-size:16px;font-family:var(--mono);text-align:center}
  .bpmlog input:focus{outline:none;border-color:var(--acc)}
  .bpmlog button{width:auto;margin:0;padding:12px 18px}

  /* métronome */
  .met{background:#080604;border:1px solid var(--line);border-radius:14px;padding:14px;margin:12px 0;text-align:center}
  .met .bpmv{font-family:var(--mono);font-size:40px;font-weight:800;line-height:1}
  .met .bpml{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:2px}
  .met .row{display:flex;gap:7px;justify-content:center;margin-top:12px}
  .met button{background:var(--bg3);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:10px 0;font-size:14px;font-weight:800;cursor:pointer;flex:1;max-width:64px}
  .met button.go{background:var(--acc);color:#221200;border-color:var(--acc);max-width:none;flex:1.6}
  .met button.go.on{background:var(--red);border-color:var(--red);color:#fff}
  .met button.sel{border-color:var(--acc);color:var(--acc)}
  .met .row+.row{margin-top:8px}
  .met .dots{display:flex;gap:8px;justify-content:center;margin-top:12px;height:10px}
  .met .dots i{width:10px;height:10px;border-radius:50%;background:var(--bg3);border:1px solid var(--line)}
  .met .dots i.on{background:var(--acc);border-color:var(--acc)}

  .selfrow{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
  .selfrow button{border:none;border-radius:10px;padding:11px 4px;font-size:12.5px;font-weight:800;cursor:pointer;background:var(--bg3);color:var(--txt);border:1px solid var(--line)}
  .selfrow button.on{background:var(--acc);color:#221200;border-color:var(--acc)}

  .opt{display:block;width:100%;text-align:left;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:13.5px;line-height:1.4;color:var(--txt);margin-bottom:7px;cursor:pointer}
  .opt.ok{border-color:var(--ok);background:#12201a}
  .opt.ko{border-color:var(--bad);background:#2a1512}
  .exp{background:var(--bg3);border-radius:12px;padding:11px;font-size:13px;line-height:1.5;color:#dcd2c6;margin:4px 0 10px;border-left:3px solid var(--acc)}
  .qq{font-size:15px;font-weight:700;line-height:1.45;margin:12px 0 10px}

  textarea,input[type=text]{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:12px;color:var(--txt);padding:12px;font-size:14px;font-family:inherit}
  textarea{min-height:70px;resize:vertical}
  textarea:focus,input:focus{outline:none;border-color:var(--acc)}

  .result{text-align:center;padding:24px 10px}
  .result .big{font-family:var(--mono);font-size:40px;font-weight:800}
  .result p{color:var(--dim);font-size:14px;margin-top:8px;line-height:1.5}
  .result .xp{color:var(--acc);font-weight:800;font-family:var(--mono);margin-top:6px}

  nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,11,9,.96);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:40}
  nav .in{max-width:520px;margin:0 auto;display:flex}
  nav button{flex:1;background:none;border:none;color:var(--dim);font-size:10.5px;font-weight:700;padding:9px 0 max(9px,env(safe-area-inset-bottom));cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button i{font-style:normal;font-size:19px}
  nav button.on{color:var(--acc)}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .stat{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);padding:13px;text-align:center}
  .stat b{font-family:var(--mono);font-size:20px;display:block}
  .stat small{font-family:var(--mono);color:var(--dim);font-size:10px;letter-spacing:.6px}
  .hm{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,12px);gap:3px;justify-content:start;margin-top:10px;overflow-x:auto;padding-bottom:4px}
  .hm i{width:12px;height:12px;border-radius:3px;background:var(--bg3)}
  .hm i.on{background:var(--acc)}
  .hm i.today{outline:1px solid var(--dim)}
  .ranks li{list-style:none;display:flex;justify-content:space-between;padding:9px 4px;border-bottom:1px solid var(--line);font-size:14px}
  .ranks li:last-child{border:none}
  .ranks li.cur{color:var(--acc);font-weight:800}
  .ranks li.past{color:var(--dim)}
  .ranks li small{color:var(--dim);font-family:var(--mono)}

  .chk{display:flex;gap:10px;align-items:flex-start;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin-bottom:7px;cursor:pointer;font-size:13.5px;line-height:1.45}
  .chk input{margin-top:2px;accent-color:var(--acc);width:17px;height:17px;flex-shrink:0}
  .chk.on{opacity:.6}

  .tierhead{display:flex;align-items:baseline;gap:8px;margin:16px 0 8px}
  .tierhead b{font-size:15px;font-style:italic}
  .tierhead small{color:var(--dim);font-size:12px}
  .tierbar{font-family:var(--mono);font-size:11px;color:var(--acc);margin-left:auto}

  .game{background:#080604;border:1px solid var(--line);border-radius:16px;padding:22px 14px;text-align:center;margin-bottom:12px}
  /* manche visuel */
  .fb{margin:12px 0;background:#0a0705;border:1px solid var(--line);border-radius:12px;padding:10px 6px 6px;overflow-x:auto}
  .fb table{border-collapse:collapse;width:100%;min-width:430px}
  .fb td{position:relative;height:30px;min-width:28px;border-right:2px solid #3a2f24;text-align:center;vertical-align:middle;cursor:pointer}
  .fb td.nut{border-right:4px solid #6b5a44}
  .fb td::after{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:#8a7a63;opacity:.55}
  .fb tr:nth-child(2) td::after{height:1px}
  .fb tr:nth-child(7) td::after{height:2px}
  .fb .dot{position:relative;z-index:2;display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:10.5px;font-weight:800;font-family:var(--mono)}
  .fb .dot.root{background:var(--acc);color:#221200}
  .fb .dot.ok{background:var(--ok);color:#02180b}
  .fb .dot.ko{background:var(--bad);color:#fff}
  .fb .dot.ghost{background:#2c3f5e;color:#cfe0ff}
  .fb .dot.h0{background:#26201a;color:#6a5c4e}
  .fb .dot.h1{background:#3a1a20;color:#ff9aa5}
  .fb .dot.h2{background:#3a2c12;color:#ffce7a}
  .fb .dot.h3{background:#12201a;color:#7ee2ab}
  .fb .fnum{color:var(--dim);font-family:var(--mono);font-size:9.5px;height:16px;cursor:default}
  .fb .sname{color:var(--dim);font-family:var(--mono);font-size:9.5px;padding-right:4px;cursor:default;border-right:none;text-align:right;min-width:22px}
  .fb tr td.sname::after{display:none}
  .game .qnote{font-size:19px;font-weight:800;margin:8px 0 2px}
  .game .qnote b{color:var(--acc)}
  .game .timer{font-family:var(--mono);font-size:13px;color:var(--dim)}
  .gopts{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:14px}
  .gopts button{background:var(--bg3);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:13px 4px;font-size:15px;font-weight:800;cursor:pointer}
  .gopts button.ok{background:#12201a;border-color:var(--ok)}
  .gopts button.ko{background:#2a1512;border-color:var(--bad)}

  #toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);background:#241a0e;border:1px solid #4a3823;color:var(--txt);padding:12px 18px;border-radius:12px;font-size:14px;font-weight:600;z-index:60;opacity:0;pointer-events:none;transition:all .25s;max-width:90%;text-align:center}
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast b{color:var(--acc)}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">SH<span>RED</span> 🎸</div>
    <div class="hbadges">
      <div class="badge">🔥 <span id="hstreak">0</span></div>
      <div class="badge gold" id="hrank">Bedroom</div>
    </div>
  </header>
  <main id="main"></main>
</div>
<div id="ov"><div class="inner" id="ovin"></div></div>
<div id="toast"></div>
<nav><div class="in">
  <button data-v="jour"><i>🎯</i>Jour</button>
  <button data-v="tech"><i>🎸</i>Technique</button>
  <button data-v="manche"><i>🗺️</i>Manche</button>
  <button data-v="rep"><i>🎵</i>Répertoire</button>
  <button data-v="profil"><i>👑</i>Profil</button>
</div></nav>

<script src="data-guitar.js?v=5"></script>
<script>
// ================= ÉTAT =================
const KEY="shred_v1";
const RANKS=[["Bedroom Player",0],["Rythmicien",150],["Soliste",350],["Lead Guitarist",650],["Shredder",1050],["Guitar Hero",1600]];
const DEF={xp:0,streak:0,lastVal:"",days:[],menu:null,bpm:{},pal:{},pieces:{},fiches:{},game:{best:0,runs:0}};
let S=load();
function load(){
  let s={}; try{ s=JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){}
  const o=Object.assign({},DEF,s);
  o.days=s.days||[]; o.bpm=s.bpm||{}; o.pal=s.pal||{}; o.pieces=s.pieces||{}; o.fiches=s.fiches||{};
  o.game=Object.assign({best:0,runs:0},s.game||{});
  return o;
}
function save(){ localStorage.setItem(KEY,JSON.stringify(S)); }
function today(){ return new Date().toISOString().slice(0,10); }
function yesterday(){ return new Date(Date.now()-864e5).toISOString().slice(0,10); }
function esc(x){ return String(x??"").replace(/</g,"&lt;"); }
function rank(){ let r=RANKS[0]; for(const x of RANKS){ if(S.xp>=x[1]) r=x; } return r; }
function nextRank(){ for(const x of RANKS){ if(S.xp<x[1]) return x; } return null; }
function dispStreak(){ return (S.lastVal===today()||S.lastVal===yesterday())?S.streak:0; }
function addXP(n){
  if(n<=0){save();header();return;}
  const b=rank()[0]; S.xp+=n; save(); header();
  if(rank()[0]!==b) setTimeout(()=>toast("👑 <b>"+rank()[0].toUpperCase()+"</b> — nouveau grade. Ça s'entend déjà."),700);
}
function header(){ document.getElementById("hstreak").textContent=dispStreak(); document.getElementById("hrank").textContent=rank()[0].split(" ")[0]; }
let toastT=null;
function toast(h){ const t=document.getElementById("toast"); t.innerHTML=h; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),3200); }

// helpers données
function exo(id){ return TEXOS.find(x=>x.id===id); }
function tmod(id){ return TMODS.find(m=>m.id===id); }
function pb(id){ const a=S.bpm[id]||[]; return a.length?Math.max(...a.map(x=>x.v)):null; }
function bpmSpark(id){
  const a=(S.bpm[id]||[]).slice(0,15).reverse().map(x=>x.v);
  if(a.length<3) return "";
  const mn=Math.min(...a),mx=Math.max(...a),rg=(mx-mn)||1;
  const pts=a.map((v,i)=>((i/(a.length-1))*100).toFixed(1)+","+(26-((v-mn)/rg)*20).toFixed(1)).join(" ");
  return `<svg viewBox="0 0 100 30" style="width:100%;height:30px;margin-top:9px" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="var(--acc)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  <div class="xptxt" style="font-size:9.5px;letter-spacing:.4px">${a.length} DERNIERS LOGS — PLUS HAUT = PLUS VITE</div>`;
}
function palierOf(x){ // niveau atteint 0-4
  if(x.bpm){ const p=pb(x.id); if(p===null) return 0; let n=0; x.bpm.forEach(b=>{if(p>=b)n++;}); return n; }
  return S.pal[x.id]||0;
}

// ================= MÉTRONOME (WebAudio) =================
// sub : clics par temps (1=noires, 2=croches, 3=triolets, 4=doubles) — indispensable pour les sextolets lents.
// trainer : mode paliers — +tStep BPM toutes les tEvery mesures, automatiquement.
const MET={bpm:100,on:false,ctx:null,next:0,tick:0,measures:0,iv:null,sub:1,trainer:false,tStep:4,tEvery:8};
function metCtx(){ if(!MET.ctx) MET.ctx=new (window.AudioContext||window.webkitAudioContext)(); return MET.ctx; }
function metClick(t,lvl){ // 2=début de mesure, 1=temps, 0=subdivision
  const c=metCtx(),o=c.createOscillator(),g=c.createGain();
  o.frequency.value=lvl===2?1400:lvl===1?950:700;
  g.gain.setValueAtTime(lvl===2?.5:lvl===1?.3:.13,t); g.gain.exponentialRampToValueAtTime(.001,t+.05);
  o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+.06);
}
function metStart(){
  const c=metCtx(); if(c.state==="suspended") c.resume();
  MET.on=true; MET.tick=0; MET.measures=0; MET.next=c.currentTime+.08;
  MET.iv=setInterval(()=>{
    while(MET.next<metCtx().currentTime+.12){
      const perM=4*MET.sub, inM=MET.tick%perM;
      const isOne=inM===0, isBeat=inM%MET.sub===0;
      metClick(MET.next,isOne?2:isBeat?1:0);
      if(isOne&&MET.tick>0){
        MET.measures++;
        if(MET.trainer&&MET.measures%MET.tEvery===0){
          MET.bpm=Math.min(240,MET.bpm+MET.tStep);
          const v=document.getElementById("metv"); if(v) v.textContent=MET.bpm;
        }
      }
      if(isBeat){
        const bi=Math.floor(inM/MET.sub);
        setTimeout(()=>{ document.querySelectorAll(".met .dots i").forEach((d,k)=>d.classList.toggle("on",k===bi)); },Math.max(0,(MET.next-metCtx().currentTime)*1000));
      }
      MET.next+=60/MET.bpm/MET.sub; MET.tick++;
    }
  },25);
  metUI();
}

function ensureMenu(){
  const t=today();
  const nextFond=THEORY.filter(x=>x.fond).find(x=>S.fiches[x.id]===undefined);
  if(S.menu&&S.menu.date===t){
    // Un menu créé AVANT l'ajout des fondations n'a pas de champ `fond` : sans ça,
    // l'exercice imposé disparaît et les six fiches restent verrouillées toute la journée.
    // On complète en place — surtout pas de régénération, qui effacerait la progression du jour.
    if(S.menu.fond===undefined){ S.menu.fond=nextFond?nextFond.id:null; save(); }
    return;
  }
  const doy=Math.floor((new Date()-new Date(new Date().getFullYear(),0,0))/864e5);
  // le créneau "manche" tourne : gammes un jour sur deux, et en alternance
  // le jeu des notes, les intervalles, l'oreille — les trois réflexes du manche
  const rot=["scale","game","scale","intervals","scale","ear"][doy%6];
  S.menu={date:t,mod:TMODS[doy%TMODS.length].id,
    manche:rot==="scale"?SCALES[doy%SCALES.length].id:rot,
    fond:nextFond?nextFond.id:null,
    dTech:false,dManche:false,dRep:false,validated:false};
  save();
}
function checkMenu(kind,ref){
  const m=S.menu; if(!m||m.date!==today()) return;
  if(kind==="tech"&&ref===m.mod) m.dTech=true;
  if(kind==="manche"&&(ref===m.manche||m.manche==="game"&&ref==="game")) m.dManche=true;
  if(kind==="rep") m.dRep=true;
  if(kind==="fond"&&ref===m.fond) m.dFond=true;
  if(m.dTech&&m.dManche&&m.dRep&&(!m.fond||m.dFond)&&!m.validated){
    m.validated=true;
    S.streak=(S.lastVal===yesterday())?S.streak+1:1;
    S.lastVal=today();
    if(!S.days.includes(today())) S.days.push(today());
    addXP(15);
    setTimeout(()=>toast("🔥 <b>Journée validée.</b> Streak : "+S.streak+" (+15 XP)"),400);
  }
  save(); header();
}
function curPiece(){ const e=Object.entries(S.pieces).find(([id,p])=>p.st==="cur"); return e?PIECES.find(p=>p.id===e[0]):null; }

let WU=null;
function openWarmup(){
  const total=WARMUP.reduce((s,w)=>s+w.s,0);
  openOv(ovTop("🔥 Échauffement")+`
    <div class="sub">${Math.round(total/60)} minutes, guidé au chrono. On ne saute pas l'échauffement avant de pousser les BPM — c'est la règle des mains qui durent.</div>`+

    `<button class="btn" onclick="runWarmup()">▶ Lancer le guide (chrono auto)</button>
     <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
}
function runWarmup(){
  WU={i:0,left:WARMUP[0].s};
  tickWarmup();
  WU.iv=setInterval(()=>{
    WU.left--;
    if(WU.left<=0){
      const el=document.getElementById("wu"+WU.i); if(el) el.classList.add("done");
      buzzWU(); WU.i++;
      if(WU.i>=WARMUP.length){ endWarmup(); return; }
      WU.left=WARMUP[WU.i].s;
    }
    tickWarmup();
  },1000);
}
function buzzWU(){ try{ if(navigator.vibrate) navigator.vibrate(80); }catch(e){} try{ const c=metCtx(); if(c.state==="suspended")c.resume(); metClick(c.currentTime,2);}catch(e){} }
function tickWarmup(){
  const w=WARMUP[WU.i];
  WARMUP.forEach((_,k)=>{ const el=document.getElementById("wu"+k); if(el){ el.style.borderColor=k===WU.i?"var(--acc)":""; el.style.opacity=k<WU.i?".45":"1"; }});
  const el=document.getElementById("wu"+WU.i);
  if(el){ const st=el.querySelector(".st")||document.createElement("div"); st.className="st"; st.style.color="var(--acc)"; st.textContent=WU.left+"s"; if(!el.querySelector(".st")) el.appendChild(st); }
}
function endWarmup(){
  if(WU&&WU.iv) clearInterval(WU.iv); WU=null;
  addXP(3); save();
  openOv(ovTop("🔥 Prêt")+`<div class="result"><div class="big">🔥</div><p>Mains chaudes, tendons réveillés. Maintenant tu peux pousser les BPM sans risque.</p><div class="xp">+3 XP</div></div>

// jeu du manche
const CHROM=["Do","Do#","Ré","Ré#","Mi","Fa","Fa#","Sol","Sol#","La","La#","Si"];
// [nom, index chromatique de la corde à vide, midi à vide]
const STRINGS=[["Mi aigu",4,64],["Si",11,59],["Sol",7,55],["Ré",2,50],["La",9,45],["Mi grave",4,40]];

// ---- son de corde : synthèse Karplus-Strong (une vraie corde pincée, pas un bip) ----
function pluck(midi,when=0,vel=.5,dur=1.4){
  try{
    const c=metCtx(); if(c.state==="suspended") c.resume();
    const sr=c.sampleRate, f=440*Math.pow(2,(midi-69)/12);
    const N=Math.max(2,Math.round(sr/f));
    const buf=c.createBuffer(1,Math.floor(sr*dur),sr), d=buf.getChannelData(0);
    const ring=new Float32Array(N);
    for(let i=0;i<N;i++) ring[i]=Math.random()*2-1;
    let idx=0;
    for(let i=0;i<d.length;i++){ const nx=(idx+1)%N; ring[idx]=.498*(ring[idx]+ring[nx]); d[i]=ring[idx]; idx=nx; }
    const src=c.createBufferSource(); src.buffer=buf;
    const g=c.createGain(); g.gain.setValueAtTime(vel,c.currentTime+when);
    g.gain.exponentialRampToValueAtTime(.001,c.currentTime+when+dur);
    src.connect(g); g.connect(c.destination); src.start(c.currentTime+when);
  }catch(e){}
}
function pluckSF(s,f,when=0,vel=.5){ pluck(STRINGS[s][2]+f,when,vel); }

// ---- manche visuel interactif ----
// marks: [{s,f,cls:'root|ok|ko|ghost|h0..h3',label}] · tap: nom d'une fonction globale(s,f)
let FBTAP=null;
function fbHtml(marks,opts){
  opts=opts||{};
  const frets=opts.frets??12;
  const mk={}; (marks||[]).forEach(m=>mk[m.s+"_"+m.f]={cls:m.cls,label:m.label??""});
  FBTAP=opts.tap||null;
  let h=`<div class="fb"><table>`;
  h+=`<tr><td class="sname"></td>${Array.from({length:frets+1},(_,f)=>`<td class="fnum">${[3,5,7,9,12].includes(f)?f:""}</td>`).join("")}</tr>`;
  for(let s=0;s<6;s++){
    h+=`<tr><td class="sname">${STRINGS[s][0].replace(" grave","g").replace(" aigu","a")}</td>`;
    for(let f=0;f<=frets;f++){
      const m=mk[s+"_"+f];
      h+=`<td class="${f===0?"nut":""}" onclick="fbTap(${s},${f})">${m?`<span class="dot ${m.cls}">${m.label}</span>`:""}</td>`;
    }
    h+=`</tr>`;
  }
  return h+`</table></div>`;
}
function fbTap(s,f){ if(FBTAP) FBTAP(s,f); }

// ---- stats par note : qui sont tes zones aveugles ? ----
function noteStat(pc){ if(!S.noteStats) S.noteStats={}; return S.noteStats[pc]||(S.noteStats[pc]={ok:0,tot:0}); }
function recNote(pc,ok){ const n=noteStat(pc); n.tot++; if(ok) n.ok++; save(); }
// tirage adaptatif : les notes ratées sortent plus souvent
function pickNote(){
  const w=CHROM.map((_,pc)=>{ const n=(S.noteStats||{})[pc]; if(!n||n.tot<3) return 3; return 1+6*(1-n.ok/n.tot); });
  let r=Math.random()*w.reduce((a,b)=>a+b,0);
  for(let pc=0;pc<12;pc++){ r-=w[pc]; if(r<=0) return pc; }
  return 11;
}
let G=null;
function gBest(m){ return (S.game.best&&typeof S.game.best==="object")?(S.game.best[m]||0):(m==="fwd"?(S.game.best||0):0); }
function setGBest(m,v){ if(!S.game.best||typeof S.game.best!=="object") S.game.best={fwd:(S.game.best||0),rev:0}; S.game.best[m]=v; }
function openGame(){
  openOv(ovTop("🎮 Le manche en 60 s")+`
    <div class="game">
      <div class="timer">Deux sens, deux réflexes. Le premier lit le manche ; le second — trouver une note — est celui de l'impro.</div>
    </div>
    <div class="act hot" onclick="startGame('fwd')">
      <div class="ico">👁️</div><div class="t"><b>Case → Note</b><small>on te donne corde + case, tu nommes la note · record ${gBest("fwd")}</small></div><div class="st">›</div>
    </div>
    <div class="act hot" onclick="startGame('rev')">
      <div class="ico">🎯</div><div class="t"><b>Note → Case</b><small>on te donne une note + une corde, tu trouves la case · record ${gBest("rev")}</small></div><div class="st">›</div>
    </div>
    <div class="xptxt" style="margin-top:8px">${S.game.runs||0} partie${(S.game.runs||0)>1?"s":""} jouées.</div>`);
}
function startGame(mode){
  G={mode,score:0,total:0,left:60,cur:null};
  G.iv=setInterval(()=>{ G.left--; const t=document.getElementById("gtimer"); if(t) t.textContent=G.left+" s"; if(G.left<=0) endGame(); },1000);
  nextQ();
}
function stopGame(){ if(G&&G.iv){clearInterval(G.iv);} G=null; }
function nextQ(){
  if(!G) return;
  const si=Math.floor(Math.random()*6), open=STRINGS[si][1];
  if(G.mode==="fwd"){
    // adaptatif : la case posée vise plus souvent tes notes faibles
    const pc=pickNote(), fret=((pc-open)%12+12)%12;
    const note=CHROM[pc];
    const opts=new Set([note]); while(opts.size<4) opts.add(CHROM[Math.floor(Math.random()*12)]);
    G.cur={note,pc,opts:[...opts].sort(()=>Math.random()-.5)};
    openOv(gameShell(`Corde de <b>${STRINGS[si][0]}</b> · case <b>${fret}</b>`,G.cur.opts));
  } else {
    // note → case, SUR le manche : tape la case (0 et 12 valent tous les deux)
    const pc=pickNote(), correctFret=((pc-open)%12+12)%12;
    G.cur={pc,si,fret:correctFret};
    openOv(gameShell(`Place <b>${CHROM[pc]}</b> sur la corde de <b>${STRINGS[si][0]}</b>`,null)+
      fbHtml([],{tap:(s,f)=>answerFB(s,f)}));
  }
}
function gameShell(prompt,opts){
  return ovTop("🎮 Le manche en 60 s")+`
    <div class="game">
      <div class="timer" id="gtimer">${G.left} s</div>
      <div class="qnote">${prompt}</div>
      <div class="timer">score ${G.score}/${G.total}</div>
      ${opts?`<div class="gopts">${opts.map((o,i)=>`<button onclick="answerG(${i})">${o}</button>`).join("")}</div>`:""}
    </div>`;
}
function answerFB(s,f){
  if(!G||!G.cur) return;
  const ok=(s===G.cur.si)&&((f%12)===(G.cur.fret%12));
  G.total++; recNote(G.cur.pc,ok);
  pluckSF(s,f,0,.45);
  if(ok){
    G.score++;
    openOv(gameShell(`Place <b>${CHROM[G.cur.pc]}</b> sur la corde de <b>${STRINGS[G.cur.si][0]}</b>`,null)+
      fbHtml([{s,f,cls:"ok",label:CHROM[G.cur.pc].slice(0,2)}],{}));
    setTimeout(nextQ,420);
  } else {
    const marks=[{s,f,cls:"ko"}]; // ta réponse, puis la bonne (et son octave si case 0)
    marks.push({s:G.cur.si,f:G.cur.fret,cls:"ok",label:CHROM[G.cur.pc].slice(0,2)});
    if(G.cur.fret===0) marks.push({s:G.cur.si,f:12,cls:"ok",label:CHROM[G.cur.pc].slice(0,2)});
    openOv(gameShell(`Place <b>${CHROM[G.cur.pc]}</b> sur la corde de <b>${STRINGS[G.cur.si][0]}</b>`,null)+fbHtml(marks,{}));
    setTimeout(()=>{ pluckSF(G.cur.si,G.cur.fret,0,.5); setTimeout(nextQ,700); },260);
  }
}
function answerG(i){
  if(!G) return;
  const ok=G.cur.opts[i]===G.cur.note;
  G.total++; recNote(G.cur.pc,ok);
  pluck(48+G.cur.pc,0,.4);
  if(ok){ G.score++; nextQ(); }
  else{
    document.querySelectorAll(".gopts button").forEach((b,k)=>{ b.disabled=true;
      const good=G.cur.opts[k]===G.cur.note;
      if(good) b.classList.add("ok"); else if(k===i) b.classList.add("ko"); });
    setTimeout(nextQ,650);
  }
}
function endGame(){
  clearInterval(G.iv);
  const sc=G.score, tot=G.total, mode=G.mode; G=null;
  S.game.runs=(S.game.runs||0)+1;
  const rec=sc>gBest(mode); if(rec) setGBest(mode,sc);
  addXP(rec?12:4); checkMenu("manche","game"); save();
  openOv(ovTop("🎮 Résultat")+`
    <div class="result"><div class="big">${sc}</div>
    <p>${mode==="fwd"?"notes nommées":"cases trouvées"} en 60 s · ${tot-sc} erreur${tot-sc>1?"s":""}${rec?" · <b style='color:var(--acc)'>RECORD</b>":""}</p>
    <p>${sc>=30?"Le manche est chez toi.":sc>=20?"Solide — les cordes Si et Sol te ralentissent encore ?":sc>=12?"Ça vient. Rejoue chaque jour, c'est du vocabulaire pur.":"Normal au début : mémorise d'abord les cases 0, 3, 5, 7 sur chaque corde."}</p></div>
    <button class="btn" onclick="startGame('${mode}')">Rejouer (${mode==="fwd"?"case→note":"note→case"})</button>
    <button class="btn ghost" onclick="openGame()">Changer de sens</button>
    <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
}

// ================= SALLE INTERVALLES =================
// Le but : les intervalles comme FORMES. Tu vois la fondamentale, tu poses l'intervalle.
const INTVS=[["tierce mineure",3],["tierce majeure",4],["quarte",5],["quinte",7],["sixte majeure",9],["septième mineure",10],["octave",12]];
let IV=null;
function openIntervals(){
  const best=(S.game.intBest||0);
  openOv(ovTop("📐 Les intervalles sur le manche")+`
    <div class="pt">On te montre une <b>fondamentale</b>. Tu poses l'intervalle demandé — n'importe quelle position juste compte. C'est l'application directe des fiches : les intervalles sont des <b>formes</b>, et l'anomalie du Si les décale d'une case.</div>
    <div class="crit"><b>10 questions, sans chrono.</b> Ici on cherche la compréhension, pas le réflexe — le réflexe, c'est le jeu des 60 s.${best?` Record : <b>${best}/10</b>.`:""}</div>
    <button class="btn" onclick="startIntervals()">Commencer</button>`);
}
function startIntervals(){ IV={n:0,score:0}; nextIV(); }
function nextIV(){
  if(!IV) return;
  if(IV.n>=10) return endIV();
  // fondamentale sur cordes graves (2-5), cases 1-7 ; cible : toute position exacte (même octave)
  for(let tries=0;tries<50;tries++){
    const rs=2+Math.floor(Math.random()*4), rf=1+Math.floor(Math.random()*7);
    const iv=INTVS[Math.floor(Math.random()*INTVS.length)];
    const rootMidi=STRINGS[rs][2]+rf, target=rootMidi+iv[1];
    const valid=[];
    for(let s=0;s<6;s++){ const f=target-STRINGS[s][2]; if(f>=0&&f<=12) valid.push({s,f}); }
    if(!valid.length) continue;
    IV.cur={rs,rf,iv,rootMidi,valid};
    pluckSF(rs,rf,0,.5);
    openOv(ovTop("📐 Intervalles · "+(IV.n+1)+"/10")+`
      <div class="game"><div class="qnote">Depuis 🟠, pose la <b>${iv[0]}</b> <span style="color:var(--dim)">(+${iv[1]} demi-tons, vers l'aigu)</span></div>
      <div class="timer">score ${IV.score}/${IV.n}</div></div>`+
      fbHtml([{s:rs,f:rf,cls:"root",label:CHROM[(STRINGS[rs][1]+rf)%12].slice(0,2)}],{tap:(s,f)=>answerIV(s,f)}));
    return;
  }
  endIV();
}
function answerIV(s,f){
  if(!IV||!IV.cur) return;
  const c=IV.cur, ok=c.valid.some(v=>v.s===s&&v.f===f);
  IV.n++;
  pluckSF(c.rs,c.rf,0,.45); pluckSF(s,f,.35,.45);
  const marks=[{s:c.rs,f:c.rf,cls:"root",label:CHROM[(STRINGS[c.rs][1]+c.rf)%12].slice(0,2)}];
  if(ok){ IV.score++; marks.push({s,f,cls:"ok"}); c.valid.filter(v=>!(v.s===s&&v.f===f)).forEach(v=>marks.push({s:v.s,f:v.f,cls:"ghost"})); }
  else { marks.push({s,f,cls:"ko"}); c.valid.forEach(v=>marks.push({s:v.s,f:v.f,cls:"ok"})); }
  openOv(ovTop("📐 Intervalles · "+IV.n+"/10")+`
    <div class="game"><div class="qnote">${ok?"✓ "+c.iv[0]:"✗ — voilà les positions justes de la "+c.iv[0]}</div>
    <div class="timer">${ok?"les points bleus : les AUTRES endroits où elle vivait — c'est la même forme qui se répète":"écoute-la, regarde la forme, elle ne changera jamais"}</div></div>`+
    fbHtml(marks,{})+`<button class="btn" onclick="nextIV()">${IV.n>=10?"Résultat":"Question suivante"}</button>`);
}
function endIV(){
  const sc=IV.score; IV=null;
  const rec=sc>(S.game.intBest||0); if(rec) S.game.intBest=sc;
  addXP(rec?12:5); checkMenu("manche","intervals"); save();
  openOv(ovTop("📐 Résultat")+`
    <div class="result"><div class="big">${sc}/10</div>
    <p>${rec?"<b style='color:var(--acc)'>RECORD</b> · ":""}${sc>=9?"Les formes sont à toi. L'impro n'est plus une loterie.":sc>=6?"Ça prend. Les erreurs viennent presque toujours de la corde Si — vérifie.":"Reprends la fiche th1 et la f6 : un intervalle est un dessin, pas un calcul."}</p></div>
    <button class="btn" onclick="startIntervals()">Rejouer</button>
    <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
}

// Reconnaître un intervalle au son — le pont entre le manche et la musique.
let ER=null;
function earSet(){
  const b=S.game.earBest||0;
  if(b>=9) return INTVS; // palette complète
  if(b>=7) return INTVS.filter(x=>[3,4,5,7,9,12].includes(x[1]));
  return INTVS.filter(x=>[3,4,7,12].includes(x[1]));
}
function openEar(){
  const b=S.game.earBest||0, set=earSet();
  openOv(ovTop("👂 L'oreille")+`
    <div class="pt">L'app joue <b>deux notes</b> (à la guitare). Tu nommes l'intervalle. C'est LA compétence qui relie le manche à ce que tu entends dans ta tête — sans elle, tu recopies ; avec elle, tu joues.</div>
    <div class="crit"><b>Palette actuelle : ${set.map(x=>x[0]).join(", ")}.</b> Elle s'élargit avec ton record (${b}/10)${b>=9?" — palette complète, respect":""}.</div>
    <div class="pt" style="font-size:12.5px">Repères qui aident : la quinte = « Star Wars » · l'octave = « Somewhere over the rainbow » · la tierce mineure = « Smoke on the Water » (le riff) · la quarte = « Amazing Grace ».</div>
    <button class="btn" onclick="startEar()">Commencer (10 questions)</button>`);
}
function startEar(){ ER={n:0,score:0,set:earSet()}; nextER(); }
function playER(){ if(!ER||!ER.cur) return; pluck(ER.cur.root,0,.5); pluck(ER.cur.root+ER.cur.iv[1],.55,.5); }
function nextER(){
  if(!ER) return;
  if(ER.n>=10) return endER();
  const iv=ER.set[Math.floor(Math.random()*ER.set.length)];
  const root=45+Math.floor(Math.random()*15);
  ER.cur={root,iv};
  const opts=new Set([iv[0]]); while(opts.size<Math.min(4,ER.set.length)) opts.add(ER.set[Math.floor(Math.random()*ER.set.length)][0]);
  ER.cur.opts=[...opts].sort(()=>Math.random()-.5);
  openOv(ovTop("👂 Oreille · "+(ER.n+1)+"/10")+`
    <div class="game"><div class="qnote">Quel est cet intervalle ?</div>
    <div class="timer">score ${ER.score}/${ER.n}</div>
    <div class="gopts" style="grid-template-columns:repeat(2,1fr)">${ER.cur.opts.map((o,i)=>`<button onclick="answerER(${i})">${o}</button>`).join("")}</div></div>
    <button class="btn ghost" onclick="playER()">🔁 Réécouter</button>`);
  setTimeout(playER,250);
}
function answerER(i){
  if(!ER||!ER.cur) return;
  const ok=ER.cur.opts[i]===ER.cur.iv[0];
  ER.n++;
  if(ok){ ER.score++; nextER(); }
  else{
    document.querySelectorAll(".gopts button").forEach((b,k)=>{ b.disabled=true;
      if(ER.cur.opts[k]===ER.cur.iv[0]) b.classList.add("ok"); else if(k===i) b.classList.add("ko"); });
    playER();
    setTimeout(nextER,1100);
  }
}
function endER(){
  const sc=ER.score; ER=null;
  const rec=sc>(S.game.earBest||0); if(rec) S.game.earBest=sc;
  addXP(rec?12:5); checkMenu("manche","ear"); save();
  openOv(ovTop("👂 Résultat")+`
    <div class="result"><div class="big">${sc}/10</div>
    <p>${rec?"<b style='color:var(--acc)'>RECORD</b>":""}${rec&&sc>=7?" · la palette s'élargit — de nouveaux intervalles entrent en jeu":""}</p>
    <p>${sc>=9?"Ton oreille précède tes doigts, c'est exactement l'ordre voulu.":sc>=6?"Solide. Chante l'intervalle AVANT de répondre : la voix ne triche pas.":"Normal au début. Accroche chaque intervalle à sa chanson-repère, ça rentre en une semaine."}</p></div>
    <button class="btn" onclick="startEar()">Rejouer</button>
    <button class="btn ghost" onclick="closeOv()">Fermer</button>`);
}

// ================= CARTE DU MANCHE =================
function openCarte(){
  const st=S.noteStats||{};
  const marks=[];
  for(let s=0;s<6;s++) for(let f=0;f<=12;f++){
    const pc=(STRINGS[s][1]+f)%12, n=st[pc];
    const cls=!n||n.tot<3?"h0":(n.ok/n.tot>=0.8?"h3":n.ok/n.tot>=0.5?"h2":"h1");
    marks.push({s,f,cls,label:CHROM[pc].slice(0,2)});
  }
  const weak=Object.entries(st).filter(([,n])=>n.tot>=3&&n.ok/n.tot<0.6).map(([pc])=>CHROM[pc]);
  openOv(ovTop("🗺️ Ta carte du manche")+`
    <div class="pt">Construite depuis tes parties du jeu des 60 s. <b style="color:#7ee2ab">Vert</b> : acquis · <b style="color:#ffce7a">ambre</b> : fragile · <b style="color:#ff9aa5">rouge</b> : zone aveugle · gris : pas assez de données. Le jeu <b>vise automatiquement tes zones rouges</b> plus souvent.</div>`+
    fbHtml(marks,{})+
    (weak.length?`<div class="crit"><b>Tes notes aveugles : ${weak.join(", ")}.</b> Ce n'est pas un hasard : tout le monde connaît Mi-La-Ré (les cordes à vide) et ignore les altérations. Dix parties et cette carte change de couleur.</div>`
      :`<div class="crit">Pas encore de zone rouge identifiée — joue au jeu des 60 s pour nourrir la carte.</div>`));
}

  openOv(ovTop(p.title)+`
    <div class="meta">${p.artist} · <span class="tag">Palier ${p.tier}</span>${p.focus.map(f=>`<span class="tag b">${f}</span>`).join("")}</div>
    <div class="pt"><b>Pourquoi ce morceau :</b> ${p.why}</div>
    ${st.st==="ok"?`<div class="crit"><b>Validé.</b> Rejoue-le une fois par mois — un morceau qu'on ne joue plus se désapprend.</div>`:`
    <p class="sub" style="margin:12px 0 6px">Critères de validation — coche seulement ce qui est VRAI, enregistrement à l'appui :</p>
    ${p.checks.map((c,i)=>`<label class="chk ${st.checks.includes(i)?"on":""}"><input type="checkbox" ${st.checks.includes(i)?"checked":""} onchange="togCheck('${id}',${i})"><span>${c}</span></label>`).join("")}
    ${st.st==="cur"
      ?`<button class="btn ghost" onclick="workedPiece('${id}')">🎸 J'ai travaillé 10 min dessus (valide le jour)</button>
        ${allChecked?`<button class="btn" onclick="validatePiece('${id}')">🏆 Valider le morceau</button>`:""}`
      :`<button class="btn" onclick="setCur('${id}')">🎯 En faire mon morceau en cours</button>`}`}
  `);
}
function togCheck(id,i){
  const st=pState(id);
  if(st.checks.includes(i)) st.checks=st.checks.filter(x=>x!==i); else st.checks.push(i);
  S.pieces[id]=st; save(); openPiece(id);
}
function setCur(id){
  Object.values(S.pieces).forEach(p=>{ if(p.st==="cur") p.st="todo"; });
  const st=pState(id); st.st="cur"; S.pieces[id]=st; save();
  toast("🎯 <b>Morceau en cours.</b> Il apparaît dans ton menu du jour.");
  openPiece(id);
}
function workedPiece(id){ checkMenu("rep",id); toast("🎸 Session comptée. La régularité fait le morceau."); openPiece(id); }
function validatePiece(id){
  const p=PIECES.find(x=>x.id===id);
  const st=pState(id); st.st="ok"; S.pieces[id]=st;
  const xp=[0,80,100,130,180][p.tier];
  addXP(xp); checkMenu("rep",id); save();
  const t=RTIERS.find(x=>x.n===p.tier), done=tierDone(p.tier);
  openOv(ovTop("🏆 Morceau validé")+`
    <div class="result"><div class="big">🏆</div>
    <div class="xp">+${xp} XP</div>
    <p><b>${p.title}</b> rejoint ton répertoire certifié.<br>${done>=t.need?"Palier "+p.tier+" <b style='color:var(--acc)'>COMPLET</b> — le palier "+(p.tier+1<=4?p.tier+1:4)+" t'attend.":done+"/"+t.need+" pour compléter le palier « "+t.name+" »."}</p></div>
    <button class="btn" onclick="closeOv();nav('rep')">Continuer</button>`);
}

// ================= BACKING TRACKS =================
function openBacking(){
  openOv(ovTop("🎚️ Backing tracks")+`
    <div class="sub">Improviser sur une vraie grille est la seule manière de transformer la technique en musique. Chaque bouton ouvre une recherche YouTube qui marche toujours.</div>`+
    BACKING.map(b=>`<div class="card" style="padding:13px">
      <b style="font-size:14.5px">${b.label}</b>
      <div class="pt" style="margin:8px 0">${b.tip}</div>
      <a class="btn" style="text-decoration:none" target="_blank" rel="noopener" href="https://www.youtube.com/results?search_query=${encodeURIComponent(b.search)}">▶ Ouvrir sur YouTube</a>
    </div>`).join(""));
}

// ================= MÉTRONOME STANDALONE =================
function openMet(){ openOv(ovTop("🕰️ Métronome")+metHtml()+`
  <div class="pt"><b>Méthode des paliers :</b> trouve le tempo où c'est propre 3 fois de suite. +4 BPM. Si ça casse deux fois, −6 BPM et re-stabilise. Termine TOUJOURS par 30 s au tempo propre — le cerveau garde la dernière impression.</div>
  <div class="pt"><b>Mode Paliers automatique :</b> active-le et le métronome monte tout seul de +${MET.tStep} BPM toutes les ${MET.tEvery} mesures — tu joues, il pousse. <b>Subdivisions :</b> ³ pour caler tes triolets, ♬♬ pour les doubles, indispensable sur le legato et les sextolets lents.</div>`); }

// ================= PROFIL =================
function heatmap(){
  const c=[];const t=new Date();
  for(let i=69;i>=0;i--){ const d=new Date(t-i*864e5).toISOString().slice(0,10);
    c.push(`<i class="${S.days.includes(d)?"on":""}${d===today()?" today":""}"></i>`); }
  return `<div class="hm">${c.join("")}</div>`;
}
function vProfil(){
  const r=rank();
  const logs=Object.values(S.bpm).reduce((s,a)=>s+a.length,0);
  const stars=TEXOS.reduce((s,x)=>s+palierOf(x),0);
  const pcs=PIECES.filter(p=>pState(p.id).st==="ok").length;
  return `<h1 class="page">Profil</h1><div class="sub">Les BPM ne mentent pas, les morceaux validés non plus.</div>
  <div class="statgrid">
    <div class="stat"><b>${S.xp}</b><small>XP</small></div>
    <div class="stat"><b>${dispStreak()} 🔥</b><small>STREAK</small></div>
    <div class="stat"><b>${stars}/${TEXOS.length*4}</b><small>PALIERS TECHNIQUE</small></div>
    <div class="stat"><b>${logs}</b><small>BPM LOGUÉS</small></div>
    <div class="stat"><b>${pcs}/${PIECES.length}</b><small>MORCEAUX VALIDÉS</small></div>
    <div class="stat"><b>${Math.max(gBest("fwd"),gBest("rev"))}</b><small>RECORD MANCHE 60s</small></div>
    <div class="stat"><b>${S.game.intBest||0}/10</b><small>INTERVALLES</small></div>
    <div class="stat"><b>${S.game.earBest||0}/10</b><small>OREILLE</small></div>
  </div>
  <div class="card"><b style="font-size:14px">Tes 10 dernières semaines</b>${heatmap()}
    <div class="xptxt" style="margin-top:6px">Un carré = un jour validé. La mémoire musculaire lit ce calendrier.</div></div>
  <div class="card"><b style="font-size:14px">La hiérarchie</b>
    <ul class="ranks" style="margin-top:8px">${RANKS.map(x=>`<li class="${x[0]===r[0]?"cur":(S.xp>=x[1]?"past":"")}"><span>${x[0]}</span><small>${x[1]} XP</small></li>`).join("")}</ul></div>
  <button class="btn ghost" onclick="exportSave()">Exporter ma progression</button>
  <button class="btn ghost" onclick="importSave()">Importer</button>
  <button class="danger" onclick="if(confirm('Tout effacer ? XP, records BPM, morceaux. Irréversible.')){localStorage.removeItem(KEY);location.reload()}">Réinitialiser</button>`;
}
function exportSave(){
  const d=JSON.stringify(S);
  const done=()=>toast("📋 <b>Copié.</b> Colle ça dans une note — sauvegarde.");
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(d).then(done,()=>prompt("Copie :",d));
  else prompt("Copie :",d);
}
function importSave(){
  const raw=prompt("Colle le JSON exporté :");
  if(!raw) return;
  try{ const s=JSON.parse(raw); if(typeof s.xp!=="number") throw 0; localStorage.setItem(KEY,raw); location.reload(); }
  catch(e){ toast("❌ JSON invalide."); }
}

// ================= INIT =================
if(location.protocol.startsWith("http")&&"serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
nav("jour");
</script>
